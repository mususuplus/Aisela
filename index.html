敌方感官，却受限于干涸的魔力而无法维系多重术式。',正式法师:'撑起的护盾足以硬抗攻城重弩，能在翱翔天际时随心驾驭室内规模的元素之力，并布下洞悉潜入者的警戒结界。',大法师:'举手投足间操纵方圆里的天象并率队跨域传送，在瞬发低阶法术的同时，还能游刃有余地篡改他人的魔咒。',传奇法师:'能够开辟自定法则的独立半位面，感知笼罩百里疆域并在挥手间禁绝一切敌对魔法，其终极之威足以一击抹除整座要塞。',见习战士:'拥有在高强度战斗中屹立不倒的耐力，能劈裂钢甲并在十步内闪避弩箭，是足以单挑三两名正规士兵的战场新锐。',正式战士:'反应速度超越凡人五倍，能徒手砸裂城墙、以肉眼难辨的残影瞬时突进并拨开乱箭，且拥有极速愈合伤口的超凡体质。',精英战士:'爆发时足以突破音障，凭感官洞悉万物震动并硬抗法师轰击，挥剑而出的真空斩击可隔空百步削断巨木。',英雄战士:'全力一击足以劈开巍峨山岳并正面抗衡禁咒洗礼，能在呼吸间跨越城镇，即便内脏重伤亦能在数小时内自我复原。',普通冒险者:'平凡的起点，却孕育着无限的可能。在这破碎的世界中，你的每一步都将铸就属于自己的传奇。'},Nl=['无','索利昂(光明之神)','诺克萨拉(黑暗之神)','瓦尔坎(战争之神)','莫尔甘(死亡之神)','艾尔薇恩(自然之神)','梅萨娜(魔法之神)','图尔克(锻造之神)'],Cl=['中央翡翠平原','北方凛冬山脉','西方永夜森林','东方赤砂荒漠','南方枯萎之地','浮空疆域'],El=({onComplete:e})=>{const[t,n]=(0,i.useState)(0),[r,a]=(0,i.useState)({profession:'普通冒险者',faith:Nl[0],location:Cl[0],status:'健康',currency:{gold:10,silver:0,copper:0}}),o=[{title:'确立你的信仰',icon:(0,s.jsx)(h,{className:'w-8 h-8 text-amber-500'})},{title:'选择你的天职',icon:(0,s.jsx)(N,{className:'w-8 h-8 text-rust-600'})},{title:'选择降临之地',icon:(0,s.jsx)(vl,{className:'w-8 h-8 text-emerald-600'})},{title:'身心状态与资产',icon:(0,s.jsx)(bl,{className:'w-8 h-8 text-gold-500'})}];return(0,s.jsx)('div',{className:'min-h-screen bg-parchment-100 py-12 px-4 flex flex-col items-center justify-center bg-[url(\'https://www.transparenttextures.com/patterns/paper-fibers.png\')]',children:(0,s.jsxs)(gl.div,{initial:{opacity:0,y:30},animate:{opacity:1,y:0},className:'max-w-6xl w-full bg-parchment-50 rounded-sm shadow-[0_20px_50px_rgba(0,0,0,0.15)] border border-ink-500/10 flex flex-col md:flex-row overflow-hidden',children:[(0,s.jsxs)('div',{className:'w-full md:w-72 bg-ink-500 p-8 text-parchment-50 flex flex-col gap-8',children:[(0,s.jsx)('h2',{className:'text-3xl font-display tracking-widest uppercase border-b border-parchment-100/10 pb-4',children:'命运编织'}),(0,s.jsx)('div',{className:'flex flex-col gap-6',children:o.map((e,n)=>(0,s.jsxs)('div',{className:'flex items-center gap-4 transition-all duration-300 '+(n===t?'translate-x-2':'opacity-40'),children:[(0,s.jsx)('div',{cla .jsx)('img',{src:_c[e],alt:e,className:'w-full h-full object-contain',style:{imageRendering:'pixelated'},onError:()=>n(!0)})},Uc=[{name:'魔王',status:'活跃',desc:'从诸神的倒影中站起，以阴影加冕，将万物纳入永恒的阴影。'},{name:'奥法之灾',status:'沉睡',desc:'脆弱的容器承载着群星的愤怒，一次呼吸便能焚毁真理的根基。'},{name:'噬根之蛇',status:'沉睡',desc:'它在万物的根基之下游走，以时间为食。当它终于咬住自己的尾巴，因果将忘记自己从何处开始。'},{name:'寂静圣画',status:'遗失',desc:'完美的艺术是不动的，它邀请所有灵魂进入那永恒不灭的美梦。'},{name:'无名荒芜',status:'扩散中',desc:'终结意味着曾经有过开始。它只是让一切从未发生过。'},{name:'盲目之光',status:'未生成',desc:'当光明不再有边界，一切轮廓都将在白昼中溶解，直到世间只剩一个声音、一个念头、一个‘我们’。'},{name:'钢铁神子',status:'封印',desc:'它的铭文里没有宽恕，它的使命里没有终止。当它睁开眼睛，生命将按名单被逐一清算。'}],Hc=[{element:'魔王',god:'黑暗之神',desc:'意志/自由的极端扭曲'},{element:'盲目之光',god:'光明之神',desc:'意识/善的极端同化'},{element:'钢铁神子',god:'战争之神',desc:'秩序/力量的极端清算'},{element:'无名荒芜',god:'死亡之神',desc:'存在/终结的极端虚无'},{element:'噬根之蛇',god:'自然之神',desc:'根基/因果的极端吞噬'},{element:'寂静圣画',god:'锻造之神',desc:'造物/变化的极端凝固'},{element:'奥法之灾',god:'魔法之神',desc:'魔力/法则的极端失控'}];const Wc={light:'# 光明之神 —— 索利昂\n\n## 名讳与位格\n\n在诸神黄昏的灰烬与焦土之上，当旧神的骸骨沉入根源地脉，当破碎的法则在虚空中重新编织——七道光芒从混沌中升起，其中最先睁开眼的，便是索利昂。\n\n祂被称为：\n\n- **白昼之父**（帝国法典的正式称谓）\n- **契约之眼**（审判庭的祈祷语）\n- **不可遮蔽者**（精灵古诗歌中的隐喻）\n- **正午的裁定者**（抗魔前线士兵的战吼）\n\n祂的圣徽是一只嵌在正午太阳中的眼睛，瞳孔处燃烧着永不停歇的白焰。麦穗环绕其外，象征祂庇护下的丰饶；锁链垂于其下，代表祂见证的律法与誓约。\n\n---\n\n## 源起 —— 光从何处来？\n\n现存的神典均以模糊的笔触记载索利昂的诞生：\n\n*"当最后一个旧神的眼睑合上，当永恒的白昼与无尽的长夜一同沉入虚无——有一道目光，从深渊的最底部向上仰望。那道目光本身，就成了光。"*\n\n观测者学会的非公开文献则持另一种推论：索利昂并非"创造"光的存在，而是**诸神黄昏后第一个意识到"光应当存在"的意识**。在那个法则尚未稳定的时代，是祂的凝视，将"可见"与"不可见"从混沌中区分出来。\n\n而与之对位的**诺克萨拉**，则在索利昂的光照出阴影的那一刻，同时诞生。\n\n---\n\n## 职能 —— 祂注视着什么？\n\n### 太阳的运行\n\n索利昂最基础的职责，是推动太阳每日跨越天穹。在创世纪元的早期，太阳的运行并不规律——有时连续百日悬于中天，有时沉入地底数年不升。是索利昂以自己的意志，为太阳划定了永恒的轨道：日出而作，日入而息，昼夜交替成为凡人纪元的基石。\n\n### 法律与审判\n\n索利昂是**"可见之秩序"**的化身。\n\n在祂的神学体系中，**"被看见"本身就意味着被审判**。任何立于光中的行为、任何在阳光下说出的誓言，都在祂的注视之下。因此，帝国的法庭从不在夜间开庭，法官的座椅必设于天窗之下——以确保索利昂的目光能直射被告的面容。\n\n祂的神职者拥有"神目裁定"的权能：在重大案件中，大祭司可以请求索利昂的目光短暂降临，那一刻，**谎言本身会发出灼烧的气味**，作伪证者的舌头会浮现焦黑的印记。\n\n### 誓约的见证\n\n凡人以索利昂之名立下的誓约，**不可被篡改，不可被遗忘，不可被否认**。\n\n无论是国王加冕时的冠冕誓言，还是农夫在田埂边的抵押承诺——只要以祂的名起誓，誓词就会被刻入一道无形的"光之档案"。神使阶以上的神职者，可以调阅这份档案，宣判某条誓约是否被违背。\n\n这也是为什么，帝国的商业契约往往以这样一句话结尾：\n*"索利昂在上，我以此光为证。"*\n\n---\n\n## 禁忌与戒律\n\n### 不可作伪证\n\n在索利昂的信仰中，这是唯一绝对不可宽恕的罪行。因为"在光中撒谎"，是对祂凝视本身的亵渎。即便在帝国法律中，伪证罪可以通过金钱赎买，但在光明神教的教义里，犯此罪者将被剥夺葬仪资格，灵魂永世飘荡于"无光之地"。\n\n### 不可在日出时分行暗杀之事\n\n黎明是索利昂目光最专注的时刻。在这个时段剥夺他人生命，等于将自己的罪行置于祂的瞳孔正中央。刺客公会有一条不成文的规矩：无论任务多紧急，必须在日出前收刀。\n\n### 不可遮蔽他人的光\n\n这一戒律被解释为：不得阻止他人接触真相，不得垄断知识的传播，不得以任何形式让另一个人"活在谎言中"。这也是光明神教与星语协会在某些学术争议上产生摩擦的神学根源——知识的封存，是否本身就是一种"遮蔽"？\n\n---\n\n## 神殿与仪式\n\n索利昂的神殿遍布帝国每一座城镇。建筑的核心特征是**顶部的巨型天窗或穹顶开口**——确保正午的阳光能直射祭坛。内部以白石与金饰为主，墙面打磨得极为光滑，不留任何阴影死角。因为阴影，在索利昂的神学中，是"未被光照见之处"，而神殿应当是光的完满领域。\n\n最重要的仪式是**正午祈祷**：每日太阳升至中天的那一刻，信徒面向天窗站立，双手掌心向上——这一姿势意味着"敞开自己，接受审视"。\n\n神职者在主持重大审判时，会佩戴一种特殊的仪式器具：**光冕**。这是一圈悬浮于头顶上方的金色光环，由极其稀有的永恒光尘凝聚而成。戴上光冕的审判官，其瞳孔会暂时呈现纯金色，据说这一刻，祂的目光与索利昂的目光短暂重合。\n\n---\n\n## 凡人眼中的索利昂\n\n在圣罗兰城的集市上，卖面包的人类老妇人会在打开烤炉时嘟囔一句"索利昂的火候正好"；牵着孩子的狼族兽人父亲，会指着正午的太阳教幼崽说"那是最大的眼睛，你做坏事祂会看见"；在绝境长城的城墙上，疲惫的士兵会在黎明时分握紧剑柄，低声祈祷：\n\n*"让我立于光中，让我的影子也被丈量。"*\n\n祂不是最仁慈的神祇——祂不宽恕谎言，不接纳遮掩，不为任何人的痛苦落泪。\n但祂是最可靠的神祇——因为只要太阳照常升起，祂的目光就从未离开。\n\n---\n\n## 最后的神谕\n\n凡人纪元第三千年，最后一位亲耳"听见"索利昂回应的苦修者临终前，留下这样一句话：\n\n*"祂只说了七个字——不是对帝国，不是对教会，是对着初升的太阳说的。祂说：\'够了，就这样继续吧。\'"*\n\n此后，再无人听见祂的声音。\n但光，每天都在继续。',dark:'# 诺克萨拉 —— 黑暗之神\n\n## 名讳与位格\n\n当索利昂的第一道光芒撕裂混沌，光所照之处，万物显形；而光未及之处，**诺克萨拉**从那里醒来。\n\n祂被称为：\n\n- **月下守望者**（隐秘教典的尊称）\n- **秘密的月亮**（盗贼公会的暗语）\n- **不可视见者**（精灵守夜者的祷词）\n- **潮汐的调度者**（沿海渔民的私下称呼）\n\n祂的圣徽是一轮残月，月牙向内弯曲如闭合的眼睑，轮廓内嵌一只**闭合的眼睛**——不是看不见，而是选择不看。月牙尖端各悬一滴墨滴，象征祂掌管的秘密：有些终将滴落示人，有些永远沉入黑暗。\n\n---\n\n## 源起 —— 光诞生时，影亦生\n\n诸神黄昏之后，当索利昂第一次睁开眼，光从祂的瞳孔中奔涌而出，照亮了残破的新世界。\n\n但光有边界。在光与光的缝隙处，在每一束光芒的背后，在一切被照亮之物的另一面——黑暗自然而然地存在。\n\n神学典籍《双生》这样记载：\n\n*"索利昂说：\'要有光，使万物显形。\'于是光有了。但光显形之物，皆有背面。那背面说：\'我亦当有主。\'于是诺克萨拉从万物的影中站起，祂的眼中没有光，却看见了光所看不见的一切。"*\n\n诺克萨拉是**必然的存在**——只要光存在，暗便与之对位。二者同日同时同刻，从同一片混沌中醒来。\n\n这就是为什么，在最古老的神话中，索利昂与诺克萨拉被描绘为**一体的双面**：白昼与黑夜交替，睁眼与闭眼循环，可见与不可见相互定义。\n\n---\n\n## 职能 —— 祂守护着什么？\n\n### 月相与潮汐\n\n诺克萨拉管辖着夜晚的天空。祂推动月亮的盈亏，如同索利昂推动太阳的运行。满月是祂"睁眼"的时刻——那一夜，所有秘密都更加脆弱；新月是祂"闭眼最深"的时刻——那一夜，最适合隐藏，也最危险。\n\n潮汐的涨落，被视为诺克萨拉的**呼吸**。涨潮时，祂在吸纳来自海洋的秘密；退潮时，祂将某些秘密释放，让搁浅的贝壳成为"被发现的消息"。沿海的渔民在夜间出海前，会悄悄向新月抛下一枚银币，祈求诺克萨拉"不要将他们的船影暴露给月光"。\n\n### 隐秘知识的守护\n\n索利昂掌管"可见的知识"——律法、誓言、公开的真理。\n而诺克萨拉掌管"不可见的知识"——尚未成熟的真相、不能公开的秘密、以及**那些一旦被所有人知道就会造成灾难的信息**。\n\n在祂的神学体系中，**秘密本身是神圣的**。不是所有真相都应当在阳光下暴晒，不是所有记忆都应当被共享。有些秘密需要被守护，直到"它该被揭露的时刻"来临。\n\n这就是为什么，以诺克萨拉之名托付的秘密，被称为**"夜誓"**——泄露者将遭受"破夜"之罚，这是诺克萨拉信仰中最严重的渎神行为，惩罚不仅是死亡，而是**被所有秘密永远遗弃**，从此任何人的秘密都会在他面前自动失效，他再也无法被信任，也无法信任任何人。\n\n### 谍报与暗影行动\n\n诺克萨拉并非邪恶之神，但祂确实是**暗中行动者的庇护者**。\n\n这不是支持罪恶，而是承认一个事实：有些正义必须在黑暗中完成，有些真相必须通过隐秘的方式获取，有些战争只能在无人知晓的地方进行。\n\n帝国的情报机构"暗部"表面效忠于皇帝，但资深成员私下会向诺克萨拉祈祷。亚里斯家族的兽人情报官，在出发执行渗透任务前，会在无月之夜割破指尖，让三滴血渗入泥土——这是对诺克萨拉最古老的献祭方式，意为"我将我的痕迹交给你保管"。\n\n---\n\n## 禁忌与戒律\n\n### 不可破夜\n\n"破夜"指泄露以诺克萨拉之名托付的秘密。这是唯一绝对不可赦免的罪行。\n\n在诺克萨拉的信仰体系中，秘密分为两种：一种是偶然得知的，可以泄露；另一种是**以祂之名正式托付的**——这种秘密在接受时，托付者和守护者之间会形成一道看不见的契约之链。泄露者，将被这道链条反噬：所有与他相关的秘密，包括他自己的身份、他的过去、他存在的意义，都会从世间缓慢"褪去"，最终他变成一个**无法被记住的人**。\n\n这比死亡更可怕。\n\n### 不可在无月之夜点燃不必要的光源\n\n无月之夜是诺克萨拉力量最纯粹的时刻。在这一夜点燃多余的光源，被视为对祂的冒犯——意味着"你宁愿相信自己的眼睛，也不愿接受黑暗的庇护"。\n\n盗贼公会的传统是：在无月之夜执行任务，不许携带任何光源，完全依靠触觉、听觉和诺克萨拉的庇护。成功归来者，可以在身上刺一枚"无月纹身"；失败者，则被认为是被诺克萨拉"拒之门外"。\n\n### 不可强行揭露"未成熟的真相"\n\n这一戒律最为微妙。它禁止以暴力或魔法手段，强行揭露那些"尚未准备好示人的真相"——比如强行读取将死之人的遗愿、在孕妇分娩前窥探胎儿的命运、或在当事人没有准备的情况下揭露其身世秘密。\n\n诺克萨拉的教义认为：**真相如同果实，未熟时采摘，只会腐烂**。强行揭露的时刻不对，比永远隐瞒更加残忍。\n\n---\n\n## 神殿与仪式\n\n诺克萨拉没有公开的神殿。\n\n祂的信仰场所隐藏于地下室、密室、建筑夹层、或天然洞穴中。入口需要特定暗语或信物——有时是一枚半月形的铜币，有时是一句只有成员知道的诗行。帝国的法律默认这些隐秘神殿的存在，前提是它们不涉及颠覆皇权或召唤灭世要素。\n\n内部陈设以黑曜石和银饰为主，唯一的光源是模拟月相的魔法冷光——根据当天的实际月相调节亮度。满月之夜，神殿内最亮；新月之夜，神殿内几乎伸手不见五指。\n\n最重要的仪式是**月隐祈祷**：在新月最深的时刻，信徒闭上双眼，双手交叠于胸前（掌心向内，朝向自己），静默站立一整夜。这一姿势意味着"我不向外寻求，我向内观看"。据说，能在这一夜感受到诺克萨拉"呼吸"的人，将获得一次"夜视"——看清自己内心深处最想隐藏的秘密。\n\n晋升仪式被称为**闭眼礼**：候选者被带入一间完全无光的密室，必须在其中度过三天三夜，没有任何食物和水，只有绝对的黑暗。三天后，如果他还清醒，密室的门会自动打开——但他不再是进入时的那个人。从此，他拥有了"黑暗中视物"的能力，不仅是物理意义上的，更是精神意义上的：他能看见别人试图隐藏的情绪、谎言背后的真相、以及秘密的轮廓。\n\n---\n\n## 与光明神教的关系 —— 非敌非友\n\n在平民口中，诺克萨拉常被误解为"邪神"或"与魔国相关的存在"。但神学层面上，祂与索利昂的关系并非敌对，而是**交替与平衡**。\n\n光明神教的正统教义承认诺克萨拉的存在，并将其定位为"必要之暗"。帝国大教堂的壁画中，有一幅描绘昼夜交替的场景：索利昂从东方升起时，诺克萨拉从西方缓缓闭眼；诺克萨拉从东方升起时，索利昂从西方沉入地平线——二者永远对视，永不重叠。\n\n但在实践中，两个信仰体系的摩擦从未停止：\n\n- 光明神教的异端审判官，偶尔会试图揭露诺克萨拉信徒的身份，认为"暗中活动者必有所图"。\n- 诺克萨拉的祭司则认为，光明神教的"一切置于阳光之下"的主张，是对隐私和秘密的暴力侵犯。\n\n双方达成的默契是：**互不主动揭露，互不公开承认，互不承认对方不承认**。\n\n---\n\n## 信徒众生相\n\n诺克萨拉的信徒从不公开身份，但他们无处不在：\n\n- **帝国情报局"暗部"的分析师**，在整理密报时会闭上一只眼睛，据说这样能看见字里行间隐藏的信息。\n- **银潮港的走私船船长**，在新月之夜出航，坚信这样的夜晚"海关的探照灯照不远"。\n- **圣罗兰城大教堂的守夜人**，一位表面敬拜索利昂的老修士，私下向诺克萨拉祈祷，因为"有些告解者的秘密，说出来会毁了他们"。\n- **永夜森林边境的精灵侦察兵**，在月相变化的夜晚调整巡逻路线，遵循一套只有他们理解的"潮汐时刻表"。\n- **那位在绝境长城上值夜班的狼族士兵**，会在月落之后放下警惕，反而更加警觉——因为"诺克萨拉的时刻，是眼睛看不见的时候，也是耳朵最该工作的时候"。\n\n---\n\n## 最后的神谕\n\n诺克萨拉从未留下可以被记录的语言——因为"语言"本身就是一种"可见"的形式。\n\n但在最古老的隐秘教典中，有一段据说是祂"用沉默说出的神谕"：\n\n*"被遮蔽的，未必是不存在的。被隐藏的，未必是虚假的。等待，不是因为怯懦；沉默，不是因为无知。当光终于照进来，你会知道哪些秘密本该永远属于黑夜。"*\n\n这段话无法被证实，也无法被证伪——正如诺克萨拉本身。',death:'# 莫尔甘 —— 死亡之神\n\n## 名讳与位格\n\n当第一个生命在艾瑟兰闭上双眼，当第一缕意识从躯体中逸散、徘徊于生与死的边界无处可去——在那永恒的寂静降临的瞬间，**莫尔甘**从那道门缝中侧身而出。\n\n祂被称为：\n\n- **门后的引渡者**（葬仪祷词的标准称谓）\n- **灰石之主**（墓园守夜人的私下称呼）\n- **沙漏的看守者**（临终告解时的敬称）\n- **最后一道门槛**（抗魔前线士兵的绝望祷词）\n\n祂的圣徽是一扇半开的石门，门缝中透出微弱的灰白光芒——那光不温暖也不刺眼，如同黎明前最暗时刻的东方天际。门楣上刻着一只沙漏，沙粒永远在流淌，却永远流不尽。\n\n---\n\n## 源起 —— 当第一个生命结束\n\n诸神黄昏之后，新世界的生灵刚刚成形。他们呼吸，他们进食，他们繁衍——但他们还不知道，这一切都会有终点。\n\n直到那一天。\n\n一个年迈的老人倒在了翡翠平原的草丛中。他的心脏停止了跳动，血液不再流淌，瞳孔逐渐涣散。围观的生灵们困惑地注视着这个不再动弹的同类——他们从未见过这样的状态。\n\n就在这时，那道半开的石门，第一次出现在世间。\n\n莫尔甘从门后走出。祂俯身抱起老人消逝的意识，那意识在祂怀中如同一缕淡淡的灰雾，茫然无措。莫尔甘没有说话，只是转身，抱着它走向那扇半开的门。\n\n在跨过门槛之前，祂回头看了一眼身后的生灵们。那一眼里没有悲悯，没有宣告，只有一种平静的确认：*"你们都会来。只是早晚。"*\n\n然后，门关上了。\n\n从此，死亡成为艾瑟兰永恒的底色。\n\n---\n\n## 职能 —— 祂守护什么？\n\n### 灵魂的引渡\n\n莫尔甘最核心的职责，是**接引亡魂**。\n\n当生命的火焰熄灭，意识脱离躯体，大多数灵魂会陷入短暂的迷茫——它们不知道自己已经死了，不知道自己该去哪里，只是飘荡在生者之间，越来越淡，越来越冷。\n\n莫尔甘的神职者，就是这些迷途灵魂的向导。\n\n通过正式的葬仪，祭司可以"打开"那道门的一丝缝隙，让亡魂感知到方向。那些被妥善引渡的灵魂，会穿过门，进入莫尔甘掌管的"等待之地"——那里不是天堂，也不是地狱，只是一个**过渡的所在**。在那里，亡魂可以慢慢放下生前的执念，最终彻底融入世界的底层记忆。\n\n而那些未被引渡的灵魂，则会逐渐消散，或在极端执念的驱使下成为怨灵——这是莫尔甘信仰最不愿看到的状况。\n\n### 墓地的守护\n\n莫尔甘管辖着所有安息之地。\n\n在祂的神学体系中，**尸体本身并不重要**——那只是灵魂曾经居住过的房子。但"房子"需要被妥善对待，因为活人需要有一个地方来寄托哀思，需要一个物理空间来完成告别的仪式。\n\n因此，莫尔甘的神殿往往与墓地相连。祭司们守护着这些圣地，防止盗墓者亵渎遗体，更防止亡灵术士偷取尸骸进行禁忌的实验。\n\n### 死亡秩序的维护\n\n莫尔甘并不"制造"死亡——那是瓦尔坎或其他意外的事。莫尔甘只管理死亡之后的秩序。\n\n但有一种情况，会触动祂的直接介入：**当死亡秩序被强行扰乱时**。\n\n亡灵法术、强行留住将死之人的灵魂、以禁忌手段延长生命——这些都是对死亡秩序的破坏。莫尔甘的神职者拥有"驱逐裁决"的权能，可以将那些本不该存在的亡灵强制送归门后。而最高阶的"终结裁定"，则可以宣判一个生命是否"已经到了该结束的时刻"——这是**确认一个已经被拖延太久的事实**。\n\n---\n\n## 禁忌与戒律\n\n### 严禁非法唤醒亡灵\n\n这是莫尔甘信仰中唯一会招致神罚的行为。\n\n在祂的秩序中，每一个灵魂都有**它该去的时间**。强行将一个已经跨过门槛的灵魂拉回现世，不仅是对那个灵魂的折磨，更是对整个死亡秩序的破坏——就像在一条河流中强行截断水流，下游的生灵会因此干渴，上游的灵魂会因此堆积。\n\n亡灵法术被帝国法律列为禁术，其神学基础正是莫尔甘的教义。那些试图召唤死者、与亡魂对话、或利用尸骸制造傀儡的术士，一旦被莫尔甘的祭司发现，将面临最严厉的制裁——即为**被逐出死亡秩序**：他们死后，莫尔甘的门将对他们永远关闭，他们的灵魂将无处可去，只能在现世永远飘荡，直到彻底消散。\n\n### 禁止在葬仪完成前触碰死者遗物\n\n这一戒律基于一个微妙的原理：**遗物上残留着死者生前的"痕迹"**。\n\n在灵魂刚刚离开、尚未被完全引渡的这段时间里，这些痕迹是最容易被扰动的。如果生者在这个时期过度触碰遗物、或带着强烈的情绪抚摸它们，可能会在无意间"拉住"那个正在走向门后的灵魂，让它产生迟疑、留恋，甚至试图回头。\n\n因此，标准的葬仪流程中，有一个环节是**祭司先行"净化"遗物**——用一种特制的安魂香熏过之后，遗物才算是"干净的"，可以被亲属保留或处理。\n\n### 不可在墓地争吵或争斗\n\n墓地是"等待之地"与现世的交界处，是死亡秩序最薄弱的节点之一。在这里发生激烈的情绪冲突，可能会扰动那些尚未走远的灵魂，甚至吸引某些不洁的存在。\n\n更朴素的理解是：**死者已经无法为自己辩解，活人在他们的安息之地争吵，是一种基本的尊重缺失**。\n\n帝国的习惯法是，在墓地范围内发生斗殴者，无论原因，都将被处以重罚——不是法律层面的重罚，而是社会层面的：村民们会自发疏远这个人，因为他们"连死者都不尊重"。\n\n---\n\n## 神殿与仪式\n\n莫尔甘的神殿建筑风格低矮沉稳，多采用半嵌入地式的结构，仿佛建筑本身就在"回归大地"。材料以灰石和铅饰为主，不求宏伟，只求**厚重、耐久、不易被时间侵蚀**。\n\n内部常年燃烧着安魂香。这种香的气味清冽微苦，有轻微的镇静作用——据说最初的配方是莫尔甘亲自托梦给第一位大祭司的。香雾缭绕中，光线被柔化，轮廓变得模糊，仿佛整个空间都在"褪去细节"。\n\n神殿的核心区域是**安息窖**——一处深入地下的石室群，用于存放无法正常下葬的遗骸：比如无人认领的尸体、因瘟疫而集体死亡者、或在异乡死去而无法回归故土的人。这些遗骸被整齐地摆放在石龛中，每一具都经过基本的净化仪式，等待有朝一日亲属来认领，或等待莫尔甘的"集体引渡"。\n\n最重要的仪式是**安魂礼**，在死者离世后的第七天举行。这一天被认为是灵魂最接近"完全离开"的时刻——如果它还有什么未了的执念，这是最后一次机会；如果它已经准备好，这是它最后回头看一眼现世的时刻。\n\n仪式由祭司主持，死者的亲友围坐在安息香缭绕的大厅中，每人手持一支未点燃的白烛。祭司念诵完固定的祷词后，会逐一走到每个人面前，用祭坛上的"永恒之火"点燃他们的蜡烛——这火据说直接引自莫尔甘门缝中透出的那道光。\n\n当最后一支蜡烛被点燃，祭司会轻声说：\n*"他/她已经看见了你们的光。可以走了。"*\n\n没有人知道那灵魂是否真的看见了。但每一个参加过安魂礼的人都说，那一刻，他们会感到一种奇异的轻松——仿佛一直压在心头的东西，终于被移开了。\n\n---\n\n## 与战争之神的关系 —— 对位而非对立\n\n莫尔甘与瓦尔坎是七柱格局中的一对对位。\n\n瓦尔坎决定"谁倒下"，莫尔甘决定"倒下之后去往何处"。战争制造死亡，死亡终结战争。\n\n在抗魔前线的军事要塞中，两座神殿往往比邻而建。士兵们出征前先去瓦尔坎的神殿放下武器祈祷，回来后如果战友阵亡，则去莫尔甘的神殿参加葬仪。祭司们彼此尊重，从无争执——因为他们知道，每一个士兵终将需要两者。\n---\n\n## 信徒众生相\n\n- **绝境长城后方的老妇人**，每天黄昏到莫尔甘神殿的安息窖前坐一会儿，那里安放着她在前线阵亡的儿子的衣冠。她不说话，只是坐着。祭司说，这是最好的悼念方式。\n- **银潮港的码头工人**，在同事被货物砸死后，主动承担了联系家属、操办后事的责任。他说："我不信莫尔甘，但死者需要有人送。"\n- **矮人地下城的深钻勘探员**，每次下井前会往口袋里装一小块"安息石"——一种经过莫尔甘祭司祝福的矿石，据说如果死在井下，这块石头能帮灵魂找到回地面的路。\n- **圣罗兰城的临终关怀者**，一位没有神职却自发照顾濒死老人的兽人女性。她会在老人最后的时刻握着他们的手，轻声说："别怕，门就在前面。很多人已经过去了，你也会的。"\n- **那位在枯萎之地边缘巡逻的巡查使**，每次进入法则紊乱区前，会闭眼三秒。那不是祈祷，只是提醒自己：*"如果我回不来，至少我知道门在哪里。"*\n\n---\n\n## 最后的神谕\n\n在每一座莫尔甘神殿的入口处，都刻着同样一句话：\n\n*"门为所有人敞开，且只敞开一次。"*\n\n就像死亡会温柔的拥抱所有人。\n\n莫尔甘不说欢迎，也不说再见。\n祂只是开门，然后等待。',war:'# 瓦尔坎 —— 战争之神\n\n## 名讳与位格\n\n当第一滴血溅落于刚刚成型的世界，当第一个生灵为了生存举起石块砸向另一个生灵——在那暴力的原初瞬间，**瓦尔坎**睁开了眼睛。\n\n祂被称为：\n\n- **钢铁之父**（帝国军团的正式称谓）\n- **胜负的秤砣**（雇佣兵营地的黑话）\n- **不灭之焰**（矮人锻造行会的战吼）\n- **决斗的见证者**（骑士册封仪式的祷词）\n\n祂的圣徽是交叉的剑与斧，交叉点处燃烧着一团永不熄灭的火焰。这团火不是温暖的光源，而是**锻打时的火星、伤口迸出的热血、攻城器械撞击城墙时擦出的火花**——一切暴力瞬间的闪光，都是瓦尔坎火焰的分支。\n\n---\n\n## 源起 —— 铁与血的第一次接触\n\n诸神黄昏之后，新世界的生灵开始繁衍生息。起初，他们互不相扰——猎物充足，领地辽阔，冲突并非必要。\n\n但第一个冬天来临了。\n\n那一年，寒潮提前三个月降临中央平原。两个部落同时发现了一头濒死的巨鹿：一个部落需要它的肉度过饥荒，另一个部落需要它的皮缝制御寒的衣物。他们对峙着，握着石矛的手在颤抖。\n\n这时，第一个部落的首领向前迈出一步。他的石矛刺入对方猎手的胸膛，温热的血喷溅在冻硬的土地上，蒸汽升腾而起。\n\n那一刻，瓦尔坎从这第一滴血中站起。祂没有愤怒，没有悲悯，只是**凝视着这第一次以命相搏的选择**，然后微微颔首：\n\n*"就是这样。这就是了。"*\n\n从此，战争成为凡人历史中永恒的主题。\n\n神学家们后来争论：瓦尔坎是战争的**创造者**，还是战争的**记录者**？主流的共识是：瓦尔坎并未"发明"战争——暴力本就潜藏在每一个生灵的本能深处。祂只是在第一滴血流下时，**选择了成为它的神**。\n\n---\n\n## 职能 —— 祂裁定什么？\n\n### 战场胜负\n\n瓦尔坎最核心的权能，是**裁定胜负**。\n\n但这与凡人的理解不同。瓦尔坎不偏袒正义的一方，不怜悯弱小的一方，也不惩罚残暴的一方。祂只尊重一件事：**以全力战斗的意志**。\n\n在祂的眼中，一场战斗的价值不在于"为什么打"，而在于"怎么打"。怯懦者必败，犹豫者必败，保留实力者必败——不是因为瓦尔坎惩罚他们，而是因为**他们自己已经选择了失败**。而那些倾尽全力的战士，即便最终倒下，也在瓦尔坎的天平上留下了重量。\n\n这就是为什么，老兵会告诉新兵："上了战场就别想活着回来。只想活的人死得最快，不怕死的人才有可能活。"\n\n### 军事策略\n\n瓦尔坎同样管辖着战争的另一面——**智慧的运用**。\n\n蛮力是战斗，计谋也是战斗。设伏、佯攻、断粮、离间——这些都是瓦尔坎认可的"战斗方式"。祂的圣徽中，剑代表正面交锋，斧代表破袭攻坚，而交叉点的那团火，则象征**战术的火花**：在绝境中想到破局之策的瞬间，那点亮光，就是瓦尔坎的注视。\n\n帝国的名将在制定作战计划时，往往会在沙盘前放一柄出鞘的剑——不是用来威胁下属，而是提醒自己：*"瓦尔坎在看，我的计谋必须配得上祂的火焰。"*\n\n### 决斗裁定\n\n在瓦尔坎的信仰体系中，**决斗是最纯粹的战争形式**——只有双方，没有援军；只有一次交锋，没有第二次机会。\n\n祭司阶以上的神职者，可以主持"瓦尔坎见证的决斗"。这种决斗一旦开始，便受神力约束：\n\n- 双方必须使用同等规格的武器（若一方使用附魔武器，另一方也必须使用同等级的附魔）\n- 不得有第三方介入\n- 不得在决斗开始后逃跑（逃跑者会被瓦尔坎标记，此后在任何战斗中都无法全力出手）\n\n决斗的败者，命运由瓦尔坎裁定——可能是死亡，可能是重伤，也可能仅仅是失去战斗能力。胜者无权处置败者，因为"胜负已经分明，不需要再补一刀"。\n\n这种决斗在现代帝国已不多见，但在某些家族恩怨、骑士荣誉纠纷中，仍会有人请求瓦尔坎的见证。一旦选择这条路，双方都不得反悔。\n\n\n---\n\n## 禁忌与戒律\n\n### 不可屠杀降者\n\n这是瓦尔坎信仰中最严重的禁忌之一，被称为**"污剑"**。\n\n当敌人放下武器、丧失战斗意志的那一刻，他就不再是"战士"，而只是一个"人"。杀死一个不再反抗的人，不是战斗，是**屠宰**。这样的剑，在瓦尔坎眼中被玷污了——此后持剑者的每一次挥砍，都会感到剑身沉重、反应迟缓，仿佛有什么东西在拖累他的手臂。\n\n帝国军法也吸收了这一戒律：屠杀战俘者，轻则开除军籍，重则处斩。但在最狂热的士兵心中，对瓦尔坎的敬畏比军法更有约束力。\n\n### 不可依赖毒杀\n\n毒杀，在瓦尔坎的信仰中被视为**懦夫的伎俩**。\n\n不是因为毒杀不致命——它很致命。而是因为**毒杀剥夺了对方战斗的机会**。被毒杀者没有挥剑的机会，没有防御的机会，甚至没有意识到自己正在被攻击。这不是战斗，这是**抹除**。\n\n当然，这一戒律在现实中常被变通：在攻城战中往水源投毒，被视为"战略手段"而非"战斗方式"，瓦尔坎的祭司通常会睁一只眼闭一只眼。但如果是在一对一的决斗中用毒，**那便是无可辩驳的渎神**。\n\n### 不可在战友倒下前撤退\n\n瓦尔坎不要求士兵战死——撤退是战术的一部分。但祂要求：**撤退前，必须确认战友已经撤离，或已经倒下**。\n\n抛弃还在战斗的战友独自逃跑，会被瓦尔坎标记为**"背弃者"**。被标记的人，此后每次战斗都会感到莫名的虚弱——不是身体上的，而是意志上的：他们总觉得自己"不该在这里"，总想寻找逃跑的机会，最终往往死得比他们抛弃的战友更快。\n\n---\n\n## 神殿与仪式\n\n瓦尔坎的神殿，风格与光明神教的洁白殿堂截然不同。\n\n建筑粗犷厚重，多用未经细致打磨的巨石垒成，墙面悬挂着战场上缴获的武器和旗帜——每一件都有一段故事，每一道划痕都是一个见证。祭坛不是石台，而是一块**未经打磨的铁砧**，表面布满锤痕。\n\n祈祷的方式也与众不同：信徒需将自己的武器置于铁砧之上，双手按住武器，闭目片刻。不需要念诵复杂的祷词，只需要**回忆自己经历过的最激烈的那场战斗**——心跳加速、手心出汗、肌肉微微绷紧，这些身体记忆，就是最好的祈祷。\n\n大型神殿通常附设**角斗训练场**，既供信徒日常锻炼，也兼作军事集会场所。帝国在征兵时，常借用瓦尔坎神殿的场地进行初选——能在训练场上坚持最久的新兵，会被祭司当场祝福。\n\n---\n\n## 战争伦理 —— 并非嗜杀\n\n在平民的印象中，瓦尔坎似乎是"嗜血好战之神"。但真正的信徒知道，事实恰恰相反。\n\n瓦尔坎的教义，本质上是**对战争的约束**。\n\n- 祂规定屠杀降者是禁忌，是在划清"战斗"与"杀戮"的界限。\n- 祂规定撤退的伦理，是在维护"战友"这一关系的圣神性。\n- 祂规定决斗的规则，是在承认"一对一"的公平是值得尊重的。\n\n祂的祭司常说一句话：\n*"瓦尔坎不教人杀人。祂教人如何面对\'必须杀人\'的时刻。"*\n\n在抗魔前线，许多士兵在第一次上阵前会被老兵带去瓦尔坎的临时祭坛——为了祈求"在害怕的时候还能挥出那一剑"。\n\n---\n\n## 与死亡之神的关系 —— 对位而非对立\n\n瓦尔坎与莫尔甘是七柱格局中的一对对位。\n\n瓦尔坎管辖**"谁倒下"**，莫尔甘管辖**"倒下之后去往何处"**。战争制造死亡，死亡终结战争——二者是同一链条上的两个环节，而非敌对的关系。\n\n在抗魔前线的军事要塞中，瓦尔坎与莫尔甘的神殿往往比邻而建。士兵出征前先去瓦尔坎神殿放下武器祈祷，回来后如果战友阵亡，则去莫尔甘神殿参加葬仪。祭司们彼此尊重，从不争抢信徒——因为每个士兵都知道，自己终将需要两者。\n\n---\n\n\n## 信徒众生相\n\n- **绝境长城上的老兵**，每天清晨擦拭自己的剑，不是为了让它更亮，而是为了感受剑身上的每一道缺口——它们记录着他经历过的每一次战斗。\n- **福尔哈德家族的狼族骑士**，在冲锋前会用爪子在自己的胸甲上划出三道痕迹，象征"勇气、力量、接受死亡"。这是家族世代相传的仪式。\n- **矮人地下城的爆破工程师**，在引爆炸药前会低声念叨瓦尔坎的名字——不是因为他们是信徒，而是因为他们尊重"瞬间决定生死"的那一刹。\n- **狮鹫酒馆里的退役佣兵**，喝醉后会解开衣襟，露出满身伤疤，让新人一个个抚摸。这是瓦尔坎式的"见证"：伤疤是不会说谎的战绩。\n- **那位第一次上阵的年轻人类士兵**，在盾墙后双腿发抖，却突然感到心跳加速、热血涌上头顶——他不知道，那就是瓦尔坎在说：*"别怕，你现在活着的感觉，就是战斗。"*\n\n---\n\n## 最后的神谕\n\n在最古老的军典中，刻着一段据说是祂在诸神黄昏后说的唯一一句话：\n\n*"钢铁不问持握者的理由。火焰不问燃烧的对象。我只问一件事：你出手时，是否全力以赴？"*\n\n这句话被无数战士在临死前默念，被无数母亲在送子出征时低语，被无数老兵在醉后的篝火旁重复。\n\n它没有答案。\n因为答案，只在出手的那一刻。',nature:'# 艾尔薇恩 —— 自然之神\n\n## 名讳与位格\n\n当第一颗种子在诸神黄昏的焦土中萌芽，当第一滴雨水落在那嫩绿的芽尖上——在生命重新开始的瞬间，**艾尔薇恩**从湿润的泥土中苏醒。\n\n祂被称为：\n\n- **万物之母**（精灵诗歌中的永恒称谓）\n- **四季的织工**（永夜森林的祭祀祷词）\n- **根系中的低语者**（德鲁伊秘会的敬称）\n- **沉睡着蛇的古树**（最古老的神话中对祂的描绘）\n\n祂的圣徽是一棵枝叶分为四季形态的巨树——春芽、夏叶、秋实、冬枝，在同一棵树上共存，象征着**时间的循环而非线性**。巨树的根系中，缠绕着一条沉睡的蛇——那是祂与根源深处那位的隐秘联系，也是祂对世间所有矛盾的包容：生与死、荣与枯、醒与眠，都在祂的根系中缠绕共存。\n\n---\n\n## 源起 —— 从灰烬中生长的绿意\n\n诸神黄昏之后，旧神的鲜血浸透了大地，法则的碎片如同锋利的玻璃散落各处。在漫长的岁月里，没有任何绿色敢于冒头——因为土壤本身还在疼痛。\n\n直到某一天，一滴雨水落在了某一片灰烬上。\n\n那滴雨水里，含着某个陨落旧神最后的眼泪。灰烬里，埋着某个古老生灵腐朽的骨骸。眼泪与骨骸相遇的那一瞬，灰烬中钻出了一点极其微弱的绿意——那是一株野草，是诸神黄昏后第一个新生的生命。\n\n艾尔薇恩，就是从那株野草的根须中，缓缓睁开眼睛的。\n\n---\n\n## 职能 —— 祂守护什么？\n\n### 自然的循环\n\n艾尔薇恩不创造生命——生命的种子早已存在于世界的底层。祂守护的是**生命得以延续的循环**：\n\n- 种子破土而出，这是祂的呼吸。\n- 枝叶伸向阳光，这是祂的伸展。\n- 花朵授粉结果，这是祂的延续。\n- 果实落地腐烂，回归泥土滋养新的生命——这是祂最深刻的奥秘：**死亡不是终结，而是循环的一环**。\n\n在祂的秩序中，没有真正的“消亡”。枯叶化作腐殖质，腐殖质滋养新芽，新芽长成大树，大树又落下新的枯叶。每一个终点都是起点，每一个起点都来自终点。\n\n这就是为什么，精灵从不“埋葬”死者，而是将遗体安放于世界树根系之间，让其被缓慢吸收。他们相信，意识会融入世界树，成为森林记忆的一部分；而血肉会回归循环，成为下一株野草的养分。\n\n### 野兽的庇护\n\n艾尔薇恩管辖着一切非人、非类人的生灵。\n\n从翱翔于凛冬山脉上空的巨鹰，到潜行于永夜森林根系的荧光鼹鼠；从翡翠平原上成群结队的野鹿，到赤砂荒漠中耐旱的沙蝎——它们都是艾尔薇恩的孩子。\n\n祂的神职者拥有“野兽沟通”的能力，这不是语言层面的交流，而是一种**意图的传递**：德鲁伊可以让野兽感知到自己没有威胁，也可以大致理解野兽的需求——是饥饿，是恐惧，是护崽，还是领地受侵。\n\n但这种能力有边界。野兽终究是野兽，它们遵循的是艾尔薇恩赋予的本能，而非人类的逻辑。试图让一头饥饿的狼放弃捕猎，或让一只发情的雄鹿冷静下来，往往只会徒劳——因为那也是艾尔薇恩的秩序。\n\n### 季节的调度\n\n艾尔薇恩掌管着四季的更替。\n\n春天是祂唤醒万物的时刻，夏天是祂让生命蓬勃生长的季节，秋天是祂允许收获也允许衰落的过渡，冬天——冬天是祂的**沉睡**。\n\n在冬季，艾尔薇恩的意识沉入地脉深处，与噬根之蛇共同沉睡。地表的世界被交给风雪与寒冷，但这并非惩罚，只是**休息**。那些在冬天死去的生灵，不是因为艾尔薇恩抛弃了它们，而是因为它们的生命节律走到了终点——这也是循环的一部分。\n\n精灵的祭司可以在特定区域召唤季节的提前或延后：让一场春雨提前降临以缓解旱情，或让秋天的寒意稍晚到来以让果实充分成熟。但这种干预必须谨慎，因为打乱一个区域的季节节律，可能会影响整个生态系统的平衡。\n\n---\n\n## 禁忌与戒律\n\n### 禁止对自然的索取超出恢复能力\n\n这是艾尔薇恩信仰中最核心的戒律，也是精灵议会与矮人地下城偶尔发生摩擦的根源。\n\n在艾尔薇恩的秩序中，**索取本身不是罪**——鹿吃草，狼吃鹿，这都是自然的一部分。但“索取”必须与“恢复”保持平衡：砍伐一棵树的同时，应当种下三棵幼苗；采集一片草药的同时，应当留下足够的根茎让其再生；狩猎一群野兽的同时，应当放过怀孕的母兽和幼崽。\n\n那些贪婪的索取者——比如为了短期利益而过度砍伐森林的人类领主，或为了追求产量而无节制开采矿脉的矮人工匠——在艾尔薇恩的眼中，是**破坏循环的伤口**。这样的伤口如果太大，祂会让那片土地“休眠”：不再生长任何东西，直到它慢慢恢复。\n\n这就是为什么，在某些被过度开发过的区域，会出现“不毛之地”——那不是诅咒，只是艾尔薇恩让土地休息。\n\n### 禁止以魔法强制扭曲动植物的自然形态\n\n这一戒律针对的是那些试图“改良”自然的魔法实验。\n\n培育新品种、通过选育让作物更高产、驯化野兽成为更温顺的家畜——这些都是被允许的，因为它们遵循的是**自然本身的变异和选择规律**。\n\n但直接以魔法手段强制改变生物的形态——比如将一只兔子改造成长着獠牙的怪物，或让一棵树在几天内长成需要几十年才能达到的高度——这是对艾尔薇恩秩序的暴力干涉。这样的改造往往伴随着巨大的代价：被改造的生物会失去繁衍能力，或寿命急剧缩短，或在精神上陷入永久的痛苦。\n\n星语协会的“封缄目录”中，有一部分内容就是与这类研究相关的。那些试图跨越这条界限的法师，一旦被发现，将面临协会和精灵议会的双重制裁。\n\n### 不可惊扰冬眠中的生灵\n\n这一戒律看似简单，却蕴含着深刻的神学意义：**休眠，是艾尔薇恩赐予所有生命的权利**。\n\n无论是冬眠的熊、蛰伏的虫、还是落叶后沉默的树——它们都在经历一个“暂时的死亡”。在这个阶段强行唤醒它们，不仅是残忍，更是对生命节律的打断。\n\n精灵的狩猎季有严格的规定：春季不猎怀孕的母兽，夏季不猎育幼的母兽，秋季是狩猎的主要季节，而冬季不猎任何东西，因为那是所有生灵休息的时刻。\n\n---\n\n## 神殿与仪式\n\n艾尔薇恩没有“人造”的神殿。\n\n祂的信仰场所，是被选定的自然地标：千年古树的树荫下、永不干涸的泉眼旁、能够俯瞰森林的山崖上、或深藏于地下的岩洞中。精灵会在这些地标周围编织活体植物，形成半开放的祈祷空间——引导枝条编织成穹顶，让藤蔓生长成座椅，用苔藓铺成柔软的地面。\n\n但核心原则是：**不砍伐、不开凿、不改变自然的本貌**。神殿只是对自然之美的“框定”，而非“改造”。\n\n最重要的仪式是**四季礼**，分别在春分、夏至、秋分、冬至举行。\n\n- **春分礼**：播种与祈愿。精灵们在古树下埋下种子，同时埋下对未来一年的愿望。祭司会为这些种子唱诵祝福，据说被祝福的种子发芽率会显著提高。\n- **夏至礼**：生长与感恩。在白昼最长的这一天，精灵们采集成熟的草药和果实，将一部分献给世界树，另一部分分发给族中的老人和孩童——这是艾尔薇恩的秩序：强者照顾弱者，长者滋养幼者。\n- **秋分礼**：收获与告别。这是最复杂的仪式。精灵们感谢这一年的收成，同时向即将离去的候鸟、即将枯萎的植物、即将休眠的野兽道别。这不是悲伤的告别，而是**“明年见”**的约定。\n- **冬至礼**：静默与等待。在白昼最短的这一天，精灵们不做任何事。他们只是坐在家中，或坐在古树下，等待。据说，如果能在这个夜晚感受到彻底的平静，就能在来年获得艾尔薇恩的“根须触碰”——一种与大地更深层的连接。\n\n---\n\n## 与锻造之神的关系 —— 生长与重塑的张力\n\n艾尔薇恩与图尔克是七柱格局中的一对对位。\n\n艾尔薇恩代表**生长**——事物按照内在的节律自然发展，从种子到巨树，从幼崽到成年，从萌芽到枯萎。\n\n图尔克代表**重塑**——以凡人之手改变自然的状态，将矿石锻造成工具，将原木加工成建筑，将皮革鞣制成铠甲。\n\n精灵神学认为，艾尔薇恩优先于图尔克——因为如果没有自然提供的原材料，锻造就无从谈起。矮人神学则持相反观点——因为如果没有锻造将自然之物转化为更有用的形态，人类和矮人将永远停留在茹毛饮血的阶段。\n\n这种分歧从未真正解决，但也从未引发战争。因为在实践中，双方都承认对方的必要性：精灵需要矮人锻造的工具来修剪树枝、开凿水渠；矮人需要精灵提供的优质木材来制作长柄武器的握柄、以及某些必须用木材而非金属的符文基座。\n\n---\n\n## 信徒众生相\n\n- **永夜森林的翠精灵老者**，每天清晨会去同一棵古树下静坐。他已经坐了三百年，那棵树已经把他当成了自己的一部分——树枝会在他头顶编织成遮阳的穹顶，根系会在他坐的地方形成舒适的凹槽。\n- **翡翠平原的人类农夫**，在播种前会向田埂边的野草说声抱歉。他说：“艾尔薇恩在上，我要种庄稼了，你们得让一让。”他的收成总是比邻居好。\n- **凛冬山脉的矮人勘探员**，在发现新矿脉后，会先挖一小块矿石放回原处，说：“这是还给大地的。”他的同伴嘲笑他迷信，但每次塌方，他总是最后一个受伤的人。\n- **赤砂荒漠边缘的游牧兽人**，在宰杀猎物后会剖开它的胃，将胃里的半消化植物撒在沙地上。“这是它吃过的，还给它活过的地方。”她说，“艾尔薇恩会知道的。”\n- **那位在枯萎之地边缘巡逻的巡查使**，每次从虚无中返回后，会第一时间触摸一棵活着的树。他说：“我需要确认自己还‘在’这个世界里。”\n\n---\n\n## 最后的神谕\n\n在永夜森林最古老的月桂树上，刻着一行极其模糊的字迹。每一个高阶祭司在晋升时，都会被带到这棵树前，尝试去“感受”那些字迹的含义。\n\n据说，有人感受到了这样一句话：\n\n*“腐叶归土，方有新芽。”*\n\n就像每一片落叶终将成为泥土，每一粒泥土终将孕育新叶。就像每一个结束里都藏着开始，每一个开始里都延续着结束。\n\n艾尔薇恩不说开始，也不说结束。\n祂只是让循环继续。\n',forging:'# 图尔克 —— 锻造之神\n\n## 名讳与位格\n\n当第一块矿石被从大地中凿出，当第一缕火焰在熔炉中燃起，当第一柄铁锤砸落在滚烫的金属上——在那火星四溅的瞬间，**图尔克**从那被锻打的铁块中诞生。\n\n祂被称为：\n\n- **祖炉之主**（矮人地下城的至高尊称）\n- **锤与砧**（工匠行会的双重隐喻）\n- **矿石的喉舌**（深钻勘探员的敬称）\n- **永恒火花的看守者**（符文铭刻师的祈祷词）\n\n祂的圣徽是一柄锤头朝下的战锤，锤面刻着精密咬合的齿轮纹样——象征着锻造不仅是蛮力，更是**精密的计算与设计**。锤柄缠绕着锁链，代表着锻造对自然材料的“束缚”与“重塑”：将矿石从它原本的状态中解放，赋予它全新的形态与意义。\n\n---\n\n## 源起 —— 第一声锤响\n\n诸神黄昏之后，凡人在大地上艰难求生。\n\n他们没有锋利的爪牙，没有厚重的毛皮，没有魔法的天赋。他们只能用双手与这个世界搏斗——而他们的双手，常常在与野兽搏斗时被撕裂，在挖掘根茎时被划破，在敲开坚果时被砸伤。\n\n直到有一天，一个矮人——传说中第一位矮人，名字早已失落在时间长河中——捡起了一块被火山喷发抛出的矿石。\n\n那块矿石在冷却后，边缘异常锋利。矮人用它切割兽皮，比用牙齿撕咬快得多。他用它挖掘块茎，比用双手刨土轻松得多。他意识到：**这块石头，可以变成他身体的延伸**。\n\n但他需要更多。他需要形状更合适的石头。\n\n于是，他架起了人类历史上的第一座熔炉——几块石头围成的圈，中间燃着木炭。他将矿石放在火中烧红，然后用一块更硬的石头敲打它。\n\n第一声锤响，在寂静的山谷中回荡。\n\n那一刻，图尔克从被敲打的铁块中睁开眼睛。祂就是**那声锤响本身**，就是**铁块在锤击下改变形状的那一瞬间**，就是**火星溅落时划出的那道短暂的光弧**。\n\n从此，凡人的双手，有了改变世界的力量。\n\n---\n\n## 职能 —— 祂守护什么？\n\n### 金属的冶炼与锻造\n\n图尔克最核心的职能，是守护一切**将原材料转化为工具的过程**。\n\n从最简单的铁匠铺，到矮人地下城深处的巨型熔炉；从打造一枚马蹄铁，到锻造一柄传奇级别的符文战斧——每一个锻造瞬间，都有图尔克的注视。\n\n在祂的神学体系中，**锻造不仅是体力劳动，更是对话**：\n\n- 矿石有自己的“意志”——它曾是山脉的一部分，曾经历过千万年的挤压与冷却。锻造不是“征服”矿石，而是**说服它成为另一种形态**。\n- 火焰有自己的“性格”——太烈则脆，太温则软。锻造师必须学会读懂火焰的颜色、声音、气味，然后与它合作。\n- 锤击有自己的“节奏”——每一锤都在改变金属的内部结构，急躁者打出的铁器容易断裂，沉稳者打出的铁器经久耐用。\n\n矮人有一句古老的格言：*“图尔克不在天上，在每一次落锤的瞬间。”*\n\n### 符文铭刻与魔法造物\n\n图尔克同样管辖着锻造的高级形式：**符文铭刻**。\n\n当一件器物被锻造完成，它只是“工具”。而当符文被铭刻其上，它就成为“造物”——一种超越了原材料本身性质的、拥有魔法属性的存在。\n\n符文的铭刻，是锻造的延续而非结束。它需要锻造师在最恰当的时机——当金属还在冷却但尚未完全定型时——用特制的刻刀将符文一笔一划地敲入表面。每一道刻痕的深浅、角度、力度，都会影响符文最终的效果。\n\n矮人地下城的符文铭刻行会，掌握着从矮人先祖传承下来的古老符文技术。这些符文不仅是魔法图案，更是**图尔克语言的碎片**——传说中，如果将所有符文拼合在一起，就能读出图尔克在诸神黄昏后说过的唯一一句话。\n\n### 建筑与工程\n\n图尔克同样守护着“大型锻造”：建筑与工程。\n\n在祂的眼中，建造一座要塞与锻造一柄战斧没有本质区别——都是将原材料（石材、木材、金属）按照设计转化为有用的形态。区别只在于规模。\n\n矮人地下城的每一道拱门、每一根承重柱、每一条通风管道，都经过精密的计算。那些看似粗犷的岩壁，实则暗含着结构力学的智慧：压力被均匀分散，重力被巧妙引导，地震波被层层缓冲。\n\n图尔克的祭司在监督大型工程时，会手持一根特制的“探振锤”——轻轻敲击建筑的各个部位，通过回声判断内部是否有裂缝、是否有空洞、是否有应力不均。这种能力被称为**“聆听石头的呼吸”**。\n\n---\n\n## 禁忌与戒律\n\n### 禁止偷工减料或以次充好\n\n在图尔克的信仰中，这是唯一绝对不可饶恕的罪行——比谋杀更令人不齿。\n\n为什么？因为谋杀只是“杀死一个人”，而偷工减料是**背叛所有使用这件器物的人**。\n\n- 一柄偷工减料的剑，可能在战场上折断，让持剑者死于敌人刀下。\n- 一座偷工减料的桥，可能在暴雨中坍塌，让过桥者葬身河底。\n- 一面偷工减料的盾牌，可能挡不住本应挡住的一击，让盾后的战友暴露在危险中。\n\n在矮人社会中，被发现以次充好的工匠，会被烙上**“伪匠”**的印记——那是一个锤头断裂的图案，烙在右手手背上。从此，他锻造的任何器物都不会有人购买，他说的任何话都不会有人相信。这不是法律惩罚，而是比法律更可怕的**社会性死亡**。\n\n### 禁止在锻造中偷窃他人的设计\n\n这一戒律保护的是“创造力”本身。\n\n在图尔克的秩序中，学习他人的技术是被鼓励的——每一个学徒都是从模仿师父开始的。但**完全抄袭他人设计的作品，然后以自己的名义出售**，是对图尔克的冒犯。\n\n因为锻造不仅是技术，更是**对话**：每一件作品都是工匠与材料的对话，也是工匠与图尔克的对话。抄袭者窃取的不仅是设计，更是那段对话的成果。\n\n被发现的抄袭者，会被要求在图尔克的神殿前公开销毁那件作品，并支付相当于作品价值三倍的罚金。如果屡教不改，则可能被逐出行会。\n\n### 禁止将锻造技艺用于纯粹破坏性的目的\n\n这一戒律在抗魔战争时期常常引发争议。\n\n图尔克不反对锻造武器——武器本身是工具，可以用来保护，也可以用来侵略。关键在于使用者的意图。\n\n但如果一件造物的**唯一目的**是造成不必要的痛苦（比如专门设计用来折磨俘虏的刑具），或者它的破坏性远远超过任何可能的正当用途（比如某种会无差别屠杀平民的禁忌武器），那么锻造它就是对图尔克的亵渎。\n\n矮人地下城的爆破工程行会，在研发新型火药武器时，有一条内部规定：任何武器的设计稿，必须经过伦理审查，确认其“不会导致不必要的痛苦”，才能进入试验阶段。\n\n---\n\n## 神殿与仪式\n\n图尔克的神殿，就是矮人地下城的**中央锻造大厅**——一座利用地热岩浆建造的巨型熔炉设施，终年高温，锤声不息。\n\n建筑以耐火岩和精钢为骨架，墙壁上镶嵌着无数符文石，既用于结构加固，也用于调节温度和通风。大厅中央是**祖炉**——一座据说自诸神黄昏后从未熄灭的巨大熔炉，炉火日夜燃烧，从不中断。\n\n祖炉就是图尔克的祭坛。最高规格的祈祷方式，就是在祖炉中完成一件作品。那些有幸被允许在祖炉前锻造的工匠，会在锻造前脱去上衣，露出满身的烧伤疤痕——每一道疤痕都是一次与火焰的对话，都是图尔克曾经“回应”的证据。\n\n最重要的仪式是**开炉礼**，在新熔炉首次点燃时举行。\n\n仪式由祭司主持，工匠将第一块矿石投入炉中，然后手持铁锤，等待祭司念诵祷词。祷词结束后，工匠必须在炉火最旺的时刻敲下第一锤——这一锤被称为**“唤醒锤”**，据说决定了这座熔炉未来所有作品的品质。\n\n如果第一锤敲得恰到好处，火星会呈完美的弧形飞溅；如果敲得太重或太轻，火星就会散乱无章。老工匠能从火星的形态中判断：这座熔炉适合锻造武器，还是更适合锻造工具，或者——如果火星呈现出诡异的紫色——这座熔炉“不干净”，需要净化和重新点火。\n\n---\n\n## 与自然之神的关系 —— 重塑与生长的张力\n\n图尔克与艾尔薇恩是七柱格局中张力最明显的一对对位。\n\n艾尔薇恩代表**生长**——事物按照内在节律自然发展。\n图尔克代表**重塑**——以凡人之手改变事物的自然状态。\n\n二者的关系，是“提供”与“改变”的永恒循环：\n\n- 艾尔薇恩提供矿石——那是山脉在千万年间孕育的结晶。\n- 图尔克将其锻造为工具——那是凡人智慧对自然的延伸。\n- 工具用于开垦土地——那是帮助艾尔薇恩的子民生长得更好。\n- 土地产出的粮食，滋养锻造师的下一代——那是循环的完成。\n\n---\n\n## 信徒众生相\n\n- **黑铁铸造行会的矮人老匠**，每天开工前会用锤柄敲击铁砧三下。不是祈祷，只是“打个招呼”。他说：“图尔克知道我在，我也知道祂在。不用说话。”\n- **符文铭刻行会的人类学徒**，左手三根手指被刻刀切断了指尖，仍然坚持每天练习符文。“图尔克不看你的手完整不完整，”他说，“祂看你刻出来的东西完整不完整。”\n- **爆破工程行会的年轻兽人**，每次引爆炸药前会后退一步，微微低头。不是害怕，是尊重：“这是图尔克的力量，我只是借来用一下。”\n- **圣罗兰城的武器商贩**，在出售每一柄剑之前，会用手指弹一下剑身，让顾客听那声回响。“好的剑会唱歌，”他说，“那是图尔克还在里面。”\n- **那位在绝境长城上值夜的士兵**，手中的剑是祖父传下来的。剑身上有七道缺口，每一道都对应着家族的一次牺牲。他每天擦拭这把剑，不是因为需要，而是因为“每次擦剑，我都感觉在和祖父说话——也和锻造这把剑的人说话。”\n\n---\n\n## 最后的神谕\n\n在矮人地下城最深处、祖炉正下方的岩壁上，刻着一段用最古老的符文写就的文字。只有符文铭刻行会的首席大工匠能够解读。\n\n那上面刻着：\n\n*“矿石不说谎，火焰不宽恕。每一锤落下，都是审判。”*\n\n一件偷工减料的器物，终究会在某个最需要它的时刻断裂。一柄用心锻造的剑，会在战场上保护它的主人到最后一刻。图尔克让每一件造物，成为它自己。\n\n锤声不息。\n火焰不灭。\n矿石，永远在等待下一双手。\n',magic:'# 梅萨娜 —— 魔法之神\n\n## 名讳与位格\n\n当第一个凡人在冥想中触碰到魔网的第一缕脉动，当第一句咒语从颤抖的唇间吐出，当第一个法术在指尖绽放出微光——在那知识与力量交汇的瞬间，**梅萨娜**从那道划破无知的闪电中睁开眼睛。\n\n祂被称为：\n\n- **真理的编织者**（星语协会的正式称谓）\n- **七柱的枢纽**（神学典籍中的定位）\n- **无尽书廊的守护者**（魔法学徒的敬称）\n- **群星的语言**（精灵古诗歌中的隐喻）\n\n祂的圣徽是一本展开的书页，书页上悬浮着一颗多面体结晶——那结晶的每一个面都映射着不同的符文，象征着**真理的多面性**：同一个问题，从不同的角度观察，会得到不同的答案；同一条法则，在不同的语境下，会有不同的解读。\n\n---\n\n## 源起 —— 从第一道闪电中醒来\n\n诸神黄昏之后，法则的碎片散落于世界的每一个角落。\n\n有些碎片太大，形成了新的神祇——那是索利昂、诺克萨拉、瓦尔坎他们。有些碎片太小，沉入地脉深处，成为日后魔网的基石。还有一些碎片，既不形成神祇，也不沉入地脉，而是**悬浮于虚空与现实之间**，等待着被某个意识触碰。\n\n那一天，一个原始部落的萨满——也许是人类，也许是兽人，历史没有记载——在雷暴中仰望天空。一道闪电劈落在他身前的地面上，泥土翻卷，空气中弥漫着焦灼的气味。\n\n他本该恐惧，本该逃跑。\n\n但他没有。\n\n他蹲下身，伸出手，触碰了那道闪电留下的灼痕。那一刻，他“看见”了什么——某种超越语言的东西，某种关于世界底层规则的**顿悟**。他无法描述自己看见了什么，但他知道，从那一天起，他能够做到别人做不到的事：让火焰在他掌心燃烧而不灼伤自己，让雨水在他头顶分开而不淋湿身体。\n\n他就是第一位法师。\n\n而梅萨娜，就是从他那一次触碰中诞生的。不是从闪电中诞生，也不是从虚空中降临——而是从**“理解”**这一行为本身中苏醒。当第一个凡人试图理解世界背后的法则，当“为什么”这个问题第一次在人类心中浮现，梅萨娜便随之存在。\n\n这就是为什么，在祂的神学中，**提出问题比找到答案更接近真理**——因为答案会过时，会被推翻，会被更精确的答案取代；而“提出问题”的能力本身，才是魔法永恒的源头。\n\n---\n\n## 职能 —— 祂守护什么？\n\n### 魔网的运行\n\n梅萨娜最基本的职责，是维护**魔网**——覆盖整个艾瑟兰的魔力传输网络。\n\n魔网并非祂“创造”的，而是诸神黄昏后自然形成的法则结构。梅萨娜的职责是**守护它不被破坏**：当某处的地脉节点因意外而堵塞，祂会引导魔力绕行；当某处的魔力浓度过高而可能引发爆炸，祂会缓慢地将多余魔力疏散到周边区域；当某个法师试图抽取超过自己承受极限的魔力，魔网会自动收紧——那感觉就像法术突然变得“滞涩”，是梅萨娜在说：“到此为止。”\n\n星语协会的以太共鸣雷达，本质上就是在“监听”魔网的呼吸。正常运转的魔网，会有一种规律的、如同潮汐般的波动；而当灭世要素活跃或地脉受损时，这种波动就会出现异常的杂音。\n\n### 魔法知识的传承\n\n梅萨娜管辖着一切与魔法相关的知识——从最简单的学徒咒语，到最艰深的根源理论。\n\n祂不创造知识——知识本就存在于世界的底层，等待被发现。祂只是**守护知识被正确传承的过程**：确保每一代法师都能站在前人的肩膀上，而不是每一次都要从零开始探索。\n\n星语协会的无尽书廊，就是梅萨娜这一职能的凡间体现。那是一座收藏着从创世纪元残篇到当代研究论文的海量文献的巨型图书馆，文献按密级分为四等——公开、限阅、机密、封缄。访问权限与访问者的法师阶位和协会内部职级挂钩。\n\n梅萨娜的祭司常说一句话：*“知识不是力量，传承的知识才是。”*\n\n### 法则的解读\n\n梅萨娜最深刻的职能，是帮助凡人**理解世界底层的法则**。\n\n当一位大法师试图解析某个法术的运作原理，当一位符文铭刻师试图理解某个古老符文的含义，当一位观测者学会的巡查使试图判断某处异常是否属于法则崩溃的征兆——在这些时刻，如果他们足够专注、足够谦卑，可能会感受到一种“豁然开朗”的瞬间：原本混乱的现象突然变得有序，原本晦涩的符文突然变得清晰。\n\n那种感觉，就是梅萨娜的触碰。\n\n祂不直接给出答案——那违背了沉默誓约。祂只是**暂时移除求知者眼前的迷雾**，让他们自己看见答案。就像在黑夜中点燃一盏灯，灯本身不是目的地，但它照亮了通往目的地的路。\n\n---\n\n## 禁忌与戒律\n\n### 禁止销毁任何形式的知识记录\n\n这是梅萨娜信仰中最核心的戒律。\n\n在祂的秩序中，**知识本身没有善恶，只有用途的善恶**。即便是最危险的知识——比如召唤某个灭世要素的仪式，或制造某种禁忌武器的配方——也应当被**封存而非销毁**。因为销毁意味着后人无法了解它、研究它、找到对抗它的方法。\n\n星语协会的“封缄目录”，就是这一戒律的实践：那些被列为“封缄”级别的禁忌知识，不是被销毁，而是被存放在无尽书廊最深处的密室中，只有大议席半数以上成员联名批准才能查阅。\n\n据说，这一戒律源于诸神黄昏的教训：旧神之所以崩溃，部分原因就是他们对某些知识的销毁太过彻底，以至于后来的神祇无法理解上一次失败的原因。\n\n### 禁止在魔法研究中故意隐瞒实验结果\n\n这一戒律保护的是**学术的诚实**。\n\n在梅萨娜的秩序中，失败的结果和成功的结果同样有价值——因为失败告诉后来者“这条路走不通”，让他们不必重复同样的错误。故意隐瞒失败，或伪造成功的数据，是对所有后来者的欺骗，也是对梅萨娜的冒犯。\n\n被发现的学术造假者，会被剥夺法师资格，名字被刻在无尽书廊入口处的“耻柱”上——那是一根黑色的石柱，上面刻着历代造假者的姓名。据说，每当有人经过那根石柱，造假者的灵魂就会感到一阵灼痛。\n\n### 禁止以魔法强行获取他人不愿分享的知识\n\n这一戒律保护的是**思想的边界**。\n\n梅萨娜鼓励求知，但反对以暴力手段获取知识。强行读取他人的记忆、在他人不情愿的情况下窥探其思想、或通过胁迫手段逼问某个秘密——这些都是对“求知”这一行为的亵渎。\n\n因为知识之所以有价值，部分原因就在于它是**自愿分享的礼物**。被强行夺走的知识，就像被强行夺走的财富——它可能有用，但它失去了“连接人与人”的功能。\n\n---\n\n## 神殿与仪式\n\n梅萨娜的神殿，就是星语协会在各地的分部。\n\n建筑风格理性而精密，以几何对称为设计原则——圆形的穹顶、方形的柱廊、螺旋的楼梯，每一个细节都遵循着某种数学规律。据说，这些建筑的尺寸比例中暗藏着魔法阵的基本构成原理，只是大多数人看不出来。\n\n核心区域是**图书馆与实验厅的复合体**。书架与实验台交错排列，法师们可以在查阅资料后立刻进行验证，也可以在实验遇到瓶颈时立刻回头查阅资料。祭坛设在图书馆中央，形制是一座微缩的法师塔模型——塔身由七层组成，对应七塔分支；塔顶悬浮着一颗不断旋转的多面体结晶，与圣徽上的那颗一模一样。\n\n最重要的仪式是**筑基仪式**，在魔法学徒晋升为正式法师时举行。\n\n仪式前，学徒需要在规定的时间内阅读完指定的文献，并提交一篇原创论文——论文不需要多么深奥，但必须是**他自己思考的结果**，而非对前人观点的简单复述。\n\n仪式当天，学徒站在祭坛前，左手按在法师塔模型上，右手握着一支鹅毛笔——那是知识的象征。大祭司会问三个问题：\n\n- “你为何追求知识？”（学徒必须给出自己的答案）\n- “你愿意为知识付出什么代价？”（学徒必须诚实地回答）\n- “你准备好了吗？”（学徒只需说“是”或“否”）\n\n如果学徒回答了三个问题，大祭司会用那支鹅毛笔在他的额头上轻轻点一下——那不是真正的墨水，而是一滴凝聚的魔力。当魔力渗入皮肤，学徒会感到一阵短暂的眩晕，然后……他就能“看见”魔网了。\n\n不是看见魔法的光芒，不是看见法术的轨迹，而是**看见知识之间的关联**。从此，他不再是盲人摸象般地学习魔法，而是能够理解每一个新知识在整体中的位置。\n\n这就是正式法师与学徒的本质区别。\n\n---\n\n## 与七柱的关系 —— 枢纽之位\n\n梅萨娜在七柱格局中占据着特殊的位置：祂不与任何神祇构成对位，而是作为**“理解一切法则的中介”**存在。\n\n在神学上，这意味着：\n\n- **索利昂**的光明法则，需要通过梅萨娜来“解读”才能被凡人所理解。\n- **诺克萨拉**的隐秘法则，需要通过梅萨娜来“揭示”才能在恰当的时机显现。\n- **瓦尔坎**的战斗法则，需要通过梅萨娜来“分析”才能转化为战术。\n- **莫尔甘**的死亡法则，需要通过梅萨娜来“记录”才能成为知识。\n- **艾尔薇恩**的自然法则，需要通过梅萨娜来“观察”才能被认知。\n- **图尔克**的锻造法则，需要通过梅萨娜来“计算”才能精确执行。\n\n这不是说其他神祇需要依靠梅萨娜才能存在——他们独立存在。而是说**凡人需要梅萨娜才能理解其他神祇的领域**。祂是知识与未知之间的桥梁，是混沌与秩序之间的翻译官。\n\n星语协会的神学家们有一个微妙的推论：梅萨娜在诸神黄昏之前可能并不存在，或者说，祂是诸神黄昏的**直接产物**——因为旧神的崩溃证明了一个真理：没有“理解”作为中介，纯粹的力量终将自我毁灭。\n\n---\n\n## 与灭世要素的暗影关系\n\n梅萨娜所对应的灭世要素，是**奥法之灾**。\n\n祂守护的是**“可理解的魔法”**——有规则的、有边界的、可以被学习和传授的魔法。在祂的秩序中，魔力是工具，法术是语言，魔网是道路。\n\n而奥法之灾，是**魔法本源的失控**——魔力奇点，一切魔法能量的共鸣核心。它不遵守规则，不承认边界，不需要学习就能调用魔力。\n\n如果说梅萨娜是“让凡人得以使用魔法的规则体系”，那奥法之灾就是 **“规则被创造之前的那片混沌”**——它存在于体系之前，也将在体系崩溃之后继续存在。\n\n梅萨娜与奥法之灾的关系，是所有对位中最微妙的。因为其他神祇与对应的灭世要素都是“秩序”与“失序”的关系，而梅萨娜与奥法之灾，更像是**“语言”与“声音”**的关系：\n\n- 梅萨娜是语法，是词汇，是句子结构——让声音变得有意义。\n- 奥法之灾是声音本身——混沌的、原始的、未被组织的。\n\n有神学家私下猜测：奥法之灾的宿主之所以能够“无阶施法”，正是因为他们在那一瞬间跳过了梅萨娜的规则体系，直接触摸到了魔力最原初的形态。那是一种**无法被传授、无法被理解、只能被体验**的状态。\n\n而梅萨娜的祭司在面对奥法之灾的宿主时，感受是极其复杂的——那既是他们毕生追求的“真理之源”，也是他们用一生建立的“理解体系”的终极威胁。\n\n---\n\n## 信徒众生相\n\n- **元素塔的年轻法师**，在实验室中度过了第三个不眠之夜。他的实验又一次失败了，但他没有沮丧，而是掏出笔记本开始记录失败的原因。“梅萨娜在上，”他嘟囔着，“至少我知道这一条路走不通。”\n- **星象塔的老占星师**，每天深夜都会仰望星空，不是预测未来，只是“听听它们在说什么”。他说：“群星的语言很慢，一句话要说几百年。但我有的是时间。”\n- **深渊塔的争议学者**，正在研究某种被许多人认为“太危险”的暗影魔法。他的桌上放着一本打开的《封缄目录》，上面用红笔写满了批注。“危险的知识也需要被理解，”他说，“否则你怎么对抗它？”\n- **永夜森林边缘的精灵记录者**，正在抄写一份古老的手稿。他的手很稳，每一个字母都精确如同印刷。他说：“我在和写下这些字的人对话——他已经死了三千年，但他的思想还在。”\n- **那位刚刚通过筑基仪式的兽人学徒**，走出神殿时抬头看天。他额头上那颗看不见的魔力印记还在微微发热。他突然意识到，自己能够“看见”空气中流动的魔力了——那些原本看不见的丝线，现在正缓缓飘动，如同某种巨大的、覆盖整个世界的蛛网。他深吸一口气，轻声说：“梅萨娜……原来你一直在。”\n\n---\n\n## 最后的神谕\n\n在无尽书廊最深处的密室中，有一本没有标题的书。书上只写着一句话，用七种不同的文字重复了七遍：\n\n*“提出问题的能力，比回答问题的能力更接近真理。”*\n\n每一个第一次读到这句话的人，都会产生一个疑问：这句话本身，是问题的答案，还是答案的问题？\n\n没有人能回答。\n但每一个试图回答的人，都在继续接近真理。\n'},qc={light:{name:'索利昂 光明之神',role:'光明、秩序、律法',symbol:'正午太阳中嵌入一只睁开的眼睛，外圈环绕麦穗与锁链',icon:zc.light},dark:{name:'诺克萨拉 黑暗之神',role:'黑暗、秘密、夜晚',symbol:'残月轮廓内嵌一只闭合的眼睛，月牙尖端各悬一滴墨滴',icon:zc.dark},war:{name:'瓦尔坎 战争之神',role:'战争、武勇、征服',symbol:'交叉的剑与斧，交叉点处是一团不灭的火焰',icon:zc.war},death:{name:'莫尔甘 死亡之神',role:'死亡、亡魂、终结',symbol:'一扇半开的石门，门缝中透出微弱的灰白光芒，门楣上刻有沙漏',icon:zc.death},nature:{name:'艾尔薇恩 自然之神',role:'自然、野兽、季节',symbol:'一棵枝叶分为四季形态的巨树，根系中缠绕着一条沉睡的蛇',icon:zc.nature},forging:{name:'图尔克 锻造之神',role:'锻造、工艺、矿石',symbol:'一柄锤头朝下的战锤，锤面刻有齿轮纹样，锤柄缠绕锁链',icon:zc.forging},magic:{name:'梅萨娜 魔法之神',role:'魔法、知
